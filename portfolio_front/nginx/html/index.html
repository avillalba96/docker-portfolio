    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ once: true, disable: 'phone' });</script>
    <script>
        document.getElementById('form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const name = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const subject = document.getElementById('asunto').value;
            const message = document.getElementById('mensaje').value;
            try {
                const response = await fetch('/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, subject, message }),
                });
                alert(window.getContactAlert?.(response.ok ? 'success' : 'error') || (response.ok ? 'OK' : 'Error'));
            } catch (error) {
                alert(window.getContactAlert?.('error') || 'Error');
            }
        });
    </script>
